<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Cultured</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Spectral:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper:       #DDD0B4;
      --paper-light: #E8DCC5;
      --paper-dark:  #C2B090;
      --ink:         #17100A;
      --ink-soft:    #362A1C;
      --accent:      #7A3B10;
      --gold:        #8C6E2A;
      --dust:        #A89070;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      cursor: none;
      font-family: 'Spectral', Georgia, serif;
      color: var(--ink);
      background-color: var(--paper);
      background-image:
        radial-gradient(ellipse 70% 50% at 12% 18%, rgba(80,50,10,0.07) 0%, transparent 65%),
        radial-gradient(ellipse 50% 70% at 88% 80%, rgba(80,50,10,0.07) 0%, transparent 65%);
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      z-index: 900; pointer-events: none; opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      z-index: 901; pointer-events: none;
      background: radial-gradient(ellipse 85% 80% at 50% 50%, transparent 50%, rgba(60,35,10,0.18) 100%);
    }

    /* ── Cursor ── */
    #cursor {
      position: fixed;
      width: 9px; height: 9px;
      background: var(--accent);
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width .25s ease, height .25s ease, background .25s ease, border-radius .25s ease;
    }
    #cursor.big { width: 40px; height: 40px; background: var(--gold); border-radius: 0; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      z-index: 800; opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
    }
    #loading.on { opacity: 1; pointer-events: all; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin: 0 4px; animation: pulse 1s ease infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    /* ── HOME ── */
    #home {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 10;
      transition: opacity .55s ease, transform .55s ease;
    }
    #home.out { opacity: 0; transform: scale(0.97); pointer-events: none; }

    .wordmark {
      font-family: 'Inconsolata', monospace;
      font-weight: 300; font-size: clamp(11px, 1.2vw, 14px);
      letter-spacing: 0.45em; text-transform: uppercase;
      color: var(--dust); margin-bottom: 2.2rem;
      opacity: 0; animation: fadeUp 1s ease .2s forwards;
    }

    .headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 400; font-size: clamp(54px, 8.5vw, 112px);
      line-height: 0.94; letter-spacing: -0.015em;
      text-align: center; color: var(--ink);
      margin-bottom: 0.4rem;
      opacity: 0; animation: fadeUp 1s ease .5s forwards;
    }
    .headline em { font-style: italic; color: var(--accent); }

    .subline {
      font-family: 'Spectral', serif; font-weight: 300; font-style: italic;
      font-size: clamp(15px, 1.7vw, 20px); color: var(--ink-soft);
      margin-bottom: 4rem;
      opacity: 0; animation: fadeUp 1s ease .8s forwards;
    }

    .portal-btn {
      font-family: 'Inconsolata', monospace;
      font-size: clamp(11px, 1vw, 13px); letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--ink); background: transparent;
      border: 1.5px solid var(--ink);
      padding: 1.15rem 3rem;
      display: inline-flex; align-items: center; gap: 0.9rem;
      cursor: none; overflow: hidden; position: relative;
      box-shadow: 4px 4px 0 var(--paper-dark);
      transition: background .25s, color .25s, transform .2s, box-shadow .2s;
      opacity: 0; animation: fadeUp 1s ease 1.1s forwards;
    }
    .portal-btn:hover {
      background: var(--ink); color: var(--paper-light);
      transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--accent);
    }
    .portal-btn:active { transform: translate(0,0); box-shadow: 2px 2px 0 var(--paper-dark); }

    .arrow { display: inline-block; transition: transform .3s ease; }
    .portal-btn:hover .arrow, .again-btn:hover .arrow { transform: translateX(5px); }

    .ripple {
      position: absolute; border-radius: 50%;
      width: 10px; height: 10px;
      background: rgba(122, 59, 16, 0.3);
      transform: translate(-50%, -50%) scale(0);
      animation: wave 0.75s ease-out forwards;
      pointer-events: none;
    }
    @keyframes wave {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(30); opacity: 0; }
    }

    /* ══════════════════════════════════════════
       POST — VISUAL FIRST LAYOUT
    ══════════════════════════════════════════ */
    #post {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      z-index: 10;
      opacity: 0; pointer-events: none;
      transition: opacity .5s ease .3s;
      overflow-y: auto;
      background: var(--ink);
    }
    #post.in { opacity: 1; pointer-events: all; }

    /* Floating top bar — sits over the video */
    .post-bar {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 2rem;
      z-index: 100;
      /* fade to transparent so it floats over video */
      background: linear-gradient(to bottom, rgba(23,16,10,0.7) 0%, transparent 100%);
    }

    .bar-back {
      font-family: 'Inconsolata', monospace;
      font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(232,220,197,0.75); background: none; border: none; cursor: none;
      transition: color .2s;
    }
    .bar-back:hover { color: var(--paper-light); }

    .bar-tags {
      display: flex; align-items: center; gap: 0.7rem;
    }
    .bar-tag {
      font-family: 'Inconsolata', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      padding: .3rem .8rem;
      border: 1px solid rgba(232,220,197,0.25);
      color: rgba(232,220,197,0.55);
    }
    .bar-tag.accent { color: var(--gold); border-color: rgba(140,110,42,0.5); }

    .bar-again {
      font-family: 'Inconsolata', monospace;
      font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--paper-light); background: transparent;
      border: 1.5px solid rgba(232,220,197,0.4);
      padding: .55rem 1.3rem; cursor: none;
      transition: background .2s, border-color .2s, color .2s;
    }
    .bar-again:hover {
      background: rgba(232,220,197,0.12);
      border-color: rgba(232,220,197,0.7);
    }

    /* ── VIDEO HERO — full width, 16:9, fills viewport ── */
    .video-hero {
      position: relative;
      width: 100%;
      /* 16:9 but at least 56vh tall */
      padding-bottom: min(56.25%, 56.25vw);
      background: #0a0704;
      flex-shrink: 0;
    }
    .video-hero iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
    }
    /* gradient fade at bottom of video into caption */
    .video-hero::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to bottom, transparent, var(--ink));
      pointer-events: none;
    }

    /* ── CAPTION LAYER — sits below video ── */
    .post-caption {
      background: var(--ink);
      padding: 2.8rem 2rem 3rem;
      max-width: 780px;
      margin: 0 auto;
      width: 100%;
    }

    .caption-meta {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.4rem;
    }
    .meta-pillar {
      font-family: 'Inconsolata', monospace;
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--gold);
    }
    .meta-dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(232,220,197,0.2); }
    .meta-region {
      font-family: 'Inconsolata', monospace;
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(232,220,197,0.35);
    }

    .caption-title {
      font-family: 'Playfair Display', serif;
      font-weight: 400; font-size: clamp(28px, 4vw, 48px);
      line-height: 1.08; letter-spacing: -0.01em;
      color: var(--paper-light);
      margin-bottom: 1.2rem;
    }
    .caption-title em { font-style: italic; color: var(--gold); }

    .caption-lede {
      font-size: clamp(15px, 1.7vw, 19px);
      font-weight: 300; font-style: italic; line-height: 1.6;
      color: rgba(232,220,197,0.65);
      border-left: 2px solid var(--accent);
      padding-left: 1.2rem;
      margin-bottom: 2rem;
    }

    .caption-note {
      font-family: 'Inconsolata', monospace;
      font-size: 11px; letter-spacing: 0.08em;
      color: rgba(232,220,197,0.3);
      margin-bottom: 2.5rem;
      font-style: italic;
    }

    /* divider */
    .caption-rule {
      width: 100%; height: 1px;
      background: rgba(232,220,197,0.08);
      margin: 2.5rem 0;
    }

    /* ── AGAIN BUTTON ── */
    .again-btn {
      font-family: 'Inconsolata', monospace;
      font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--paper-light); background: transparent;
      border: 1.5px solid rgba(232,220,197,0.35);
      padding: 1rem 2.4rem; cursor: none;
      display: inline-flex; align-items: center; gap: .8rem;
      transition: background .2s, border-color .2s, transform .2s;
    }
    .again-btn:hover {
      background: rgba(232,220,197,0.08);
      border-color: rgba(232,220,197,0.65);
      transform: translateX(3px);
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: .2; transform: scale(.8); }
      50%       { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>

  <div id="loading">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>

  <!-- HOME -->
  <div id="home">
    <div class="wordmark">Get Cultured</div>
    <h1 class="headline">The world is<br><em>stranger</em><br>than you think.</h1>
    <p class="subline">One niche cultural discovery at a time.</p>
    <button class="portal-btn" id="mainBtn">Get Cultured <span class="arrow">→</span></button>
  </div>

  <!-- POST -->
  <div id="post">
    <nav class="post-bar">
      <button class="bar-back" id="backBtn">← Get Cultured</button>
      <div class="bar-tags">
        <span class="bar-tag accent" id="postPillar">Sound</span>
        <span class="bar-tag" id="postRegion">Tuva, Russia</span>
      </div>
      <button class="bar-again" id="navAgainBtn">Again →</button>
    </nav>

    <div id="postContent"></div>
  </div>

  <script>
    /* ── Cursor ── */
    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top  = e.clientY + 'px';
    });
    function bindHover() {
      document.querySelectorAll('button').forEach(el => {
        el.addEventListener('mouseenter', () => cur.classList.add('big'));
        el.addEventListener('mouseleave', () => cur.classList.remove('big'));
      });
    }
    bindHover();

    /* ── Content ── */
    const posts = [
      {
        type: 'The Clip',
        pillar: 'Sound',
        region: 'Tuva, Russia',
        title: 'One Throat, <em>Two Notes</em>',
        lede: 'Tuvan throat singers produce two distinct pitches simultaneously — a low drone and a high whistling melody — from a single human voice.',
        videoId: 'R2ovoRyv4kw',
        note: 'Huun-Huur-Tu performing live — one of Tuva\'s most celebrated ensembles.'
      },
      {
        type: 'The Clip',
        pillar: 'Play',
        region: 'Southeast Asia',
        title: 'Sepak Takraw — <em>The Impossible Sport</em>',
        lede: 'Volleyball crossed with acrobatic martial arts. The spike is an overhead bicycle kick performed mid-air. It is a real sport played at Olympic level.',
        videoId: 'AA1OYsPugV0',
        note: 'Professional Sepak Takraw — watch the overhead kick at full speed.'
      },
      {
        type: 'The Clip',
        pillar: 'Believe',
        region: 'Rajasthan, India',
        title: 'The Sound of <em>Manganiyar</em>',
        lede: 'The Manganiyar are a hereditary community of Muslim musicians from the Thar Desert. They have been performing for Rajput patrons for centuries. Their music sounds like it was made at the edge of the world.',
        videoId: 'gWOuYAJ1-zI',
        note: 'Recorded live — the khamaycha (bowed lute) and dholak in full conversation.'
      },
      {
        type: 'The Clip',
        pillar: 'Taste',
        region: 'Ethiopia',
        title: 'The Coffee Ceremony is <em>Not About Coffee</em>',
        lede: 'Ethiopia gave the world coffee. But Jebena Buna — the ceremony built around it — is not about caffeine. It is about time, and who you choose to spend it with.',
        videoId: 'TKT5MloFYcQ',
        note: 'Three rounds. One to two hours. The third cup carries a blessing.'
      }
    ];

    let last = -1;

    function buildPost(p) {
      return `
        <div class="video-hero">
          <iframe
            width="100%" height="100%"
            src="https://www.youtube.com/embed/${p.videoId}?autoplay=1&rel=0&modestbranding=1"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen>
          </iframe>
        </div>
        <div class="post-caption">
          <div class="caption-meta">
            <span class="meta-pillar">${p.pillar}</span>
            <span class="meta-dot"></span>
            <span class="meta-region">${p.region}</span>
          </div>
          <h1 class="caption-title">${p.title}</h1>
          <p class="caption-lede">${p.lede}</p>
          <p class="caption-note">↑ ${p.note}</p>
          <div class="caption-rule"></div>
          <button class="again-btn" onclick="goSomewhere()">Get Cultured Again <span class="arrow">→</span></button>
        </div>
      `;
    }

    function goSomewhere() {
      const loading = document.getElementById('loading');
      loading.classList.add('on');

      setTimeout(() => {
        let i;
        do { i = Math.floor(Math.random() * posts.length); } while (i === last && posts.length > 1);
        last = i;
        const p = posts[i];

        document.getElementById('postPillar').textContent  = p.pillar;
        document.getElementById('postRegion').textContent  = p.region;
        document.getElementById('postContent').innerHTML   = buildPost(p);
        document.getElementById('post').scrollTop = 0;

        bindHover();

        document.getElementById('home').classList.add('out');
        document.getElementById('post').classList.add('in');
        loading.classList.remove('on');
      }, 500);
    }

    function goHome() {
      // Clear iframe to stop video playing in background
      document.getElementById('postContent').innerHTML = '';
      document.getElementById('post').classList.remove('in');
      document.getElementById('home').classList.remove('out');
    }

    /* Ripple on main button */
    document.getElementById('mainBtn').addEventListener('click', e => {
      const btn = e.currentTarget;
      const rect = btn.getBoundingClientRect();
      const r = document.createElement('span');
      r.classList.add('ripple');
      r.style.left = (e.clientX - rect.left) + 'px';
      r.style.top  = (e.clientY - rect.top)  + 'px';
      btn.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
      goSomewhere();
    });

    document.getElementById('backBtn').addEventListener('click', goHome);
    document.getElementById('navAgainBtn').addEventListener('click', goSomewhere);
  </script>
</body>
</html>
